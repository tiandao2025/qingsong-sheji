// ==================== AUTH ====================
var ADMIN_TOKEN = sessionStorage.getItem('admin_token') || '';

function getAdminToken() {
  return ADMIN_TOKEN;
}

function isLoggedIn() {
  return !!ADMIN_TOKEN;
}

async function handleLogin() {
  var input = document.getElementById('loginPassword');
  var errorEl = document.getElementById('loginError');
  var password = input.value.trim();

  if (!password) {
    errorEl.textContent = '请输入密码';
    return;
  }

  input.disabled = true;
  errorEl.textContent = '';

  try {
    var res = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: password })
    });
    var data = await res.json();

    if (data.success && data.token) {
      ADMIN_TOKEN = data.token;
      sessionStorage.setItem('admin_token', data.token);
      document.getElementById('loginOverlay').classList.add('login-hidden');
      initAdmin();
    } else {
      errorEl.textContent = data.error || '密码错误';
      input.value = '';
      input.classList.add('login-shake');
      input.focus();
      setTimeout(function() { input.classList.remove('login-shake'); }, 500);
    }
  } catch (e) {
    errorEl.textContent = '网络错误，请重试';
  }

  input.disabled = false;
}

// Allow Enter key to submit
document.addEventListener('DOMContentLoaded', function() {
  var input = document.getElementById('loginPassword');
  if (input) {
    input.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') handleLogin();
    });
  }
});

// ==================== IMAGE UPLOAD (Cloudflare R2) ====================
function formatBytes(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
  return (bytes / 1048576).toFixed(2) + ' MB';
}

// 使用 Canvas 自动压缩图片：宽度上限 1200px，JPEG 质量 0.8，PNG 保持格式
async function compressImage(file) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    const objectUrl = URL.createObjectURL(file);
    img.onload = function () {
      URL.revokeObjectURL(objectUrl);
      const MAX_WIDTH = 1200;
      let { width, height } = img;
      if (width > MAX_WIDTH) {
        height = Math.round(height * (MAX_WIDTH / width));
        width = MAX_WIDTH;
      }
      const canvas = document.createElement('canvas');
      canvas.width = width;
      canvas.height = height;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, width, height);
      const isPNG = file.type === 'image/png';
      const mimeType = isPNG ? 'image/png' : 'image/jpeg';
      const quality = isPNG ? undefined : 0.8;
      canvas.toBlob(function (blob) {
        if (blob) {
          resolve({ blob: blob, originalSize: file.size, compressedSize: blob.size });
        } else {
          reject(new Error('图片压缩失败'));
        }
      }, mimeType, quality);
    };
    img.onerror = function () {
      URL.revokeObjectURL(objectUrl);
      reject(new Error('图片加载失败'));
    };
    img.src = objectUrl;
  });
}

// 生成 400px 宽 WebP 缩略图（用于博客封面等场景）
async function generateThumbnail(file) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    const objectUrl = URL.createObjectURL(file);
    img.onload = function() {
      URL.revokeObjectURL(objectUrl);
      const THUMB_WIDTH = 400;
      let w = img.width, h = img.height;
      if (w > THUMB_WIDTH) {
        h = Math.round(h * (THUMB_WIDTH / w));
        w = THUMB_WIDTH;
      }
      const canvas = document.createElement('canvas');
      canvas.width = w;
      canvas.height = h;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, w, h);
      canvas.toBlob(function(blob) {
        if (blob) resolve(blob);
        else reject(new Error('缩略图生成失败'));
      }, 'image/webp', 0.8);
    };
    img.onerror = function() {
      URL.revokeObjectURL(objectUrl);
      reject(new Error('图片加载失败'));
    };
    img.src = objectUrl;
  });
}

async function uploadToR2(file, statusEl, options) {
  if (!file || !(file instanceof Blob)) {
    console.error('[uploadToR2] 无效文件对象:', file);
    if (statusEl) statusEl.textContent = '文件无效';
    throw new Error('无效的文件对象');
  }
  console.log('[uploadToR2] 开始上传, 文件类型:', file.type, '大小:', file.size);
  if (statusEl) statusEl.textContent = '压缩中...';
  let blob = file;
  let originalSize = file.size;
  let compressedSize = file.size;
  if (file.type && file.type.startsWith('image/')) {
    try {
      const result = await compressImage(file);
      blob = result.blob;
      originalSize = result.originalSize;
      compressedSize = result.compressedSize;
      console.log('[uploadToR2] 压缩完成, 原始:', originalSize, '压缩后:', compressedSize);
    } catch (e) {
      console.error('[uploadToR2] 压缩失败:', e);
      if (statusEl) statusEl.textContent = '压缩失败';
      throw e;
    }
  }
  if (statusEl) statusEl.textContent = '上传中...';
  const formData = new FormData();
  formData.append('file', blob, file.name || 'image.png');
  console.log('[uploadToR2] 上传中, blob类型:', blob.type, '大小:', blob.size);
  try {
    const res = await fetch('/api/upload', { method: 'POST', body: formData });
    const data = await res.json();
    console.log('[uploadToR2] API响应:', res.status, data);
    if (!res.ok) throw new Error(data.error || '上传失败');
    if (statusEl) statusEl.textContent = data.url;

    const result = { url: data.url, originalSize: originalSize, compressedSize: compressedSize };

    // Generate and upload thumbnail if requested (for blog covers)
    if (options && options.generateThumb && file.type && file.type.startsWith('image/')) {
      try {
        if (statusEl) statusEl.textContent = '生成缩略图...';
        const thumbBlob = await generateThumbnail(file);
        const thumbFormData = new FormData();
        const baseName = (file.name || 'image.png').replace(/(\.[^.]+)$/, '');
        thumbFormData.append('file', thumbBlob, baseName + '_thumb.webp');
        const thumbRes = await fetch('/api/upload', { method: 'POST', body: thumbFormData });
        const thumbData = await thumbRes.json();
        if (thumbRes.ok) {
          result.thumbUrl = thumbData.url;
        } else {
          console.error('[uploadToR2] 缩略图上传失败:', thumbData.error);
        }
      } catch(e) {
        console.error('[uploadToR2] 缩略图生成/上传失败:', e);
      }
    }

    return result;
  } catch (e) {
    console.error('[uploadToR2] 上传失败:', e);
    if (statusEl) statusEl.textContent = '上传失败';
    throw e;
  }
}

async function handleImageUpload(input) {
  const file = input.files[0];
  if (!file) return;
  const parentDiv = input.parentElement.parentElement;
  const textInput = parentDiv.querySelector('input.form-input');
  const label = input.parentElement;
  // Create status indicator
  const statusSpan = document.createElement('span');
  statusSpan.style.cssText = 'font-size:12px;color:#C9A96E;margin-left:6px;white-space:nowrap;';
  statusSpan.textContent = '压缩中...';
  label.insertAdjacentElement('afterend', statusSpan);
  input.disabled = true;
  try {
    const result = await uploadToR2(file, statusSpan);
    if (textInput) textInput.value = result.url;
    showToast('上传成功: ' + formatBytes(result.originalSize) + ' → ' + formatBytes(result.compressedSize), true);
  } catch (e) {
    showToast('上传失败: ' + (e.message || '网络错误'));
    statusSpan.textContent = '上传失败';
  }
  input.value = '';
  input.disabled = false;
}

function saveCase(editId) {
  try {
    const nameEl = document.getElementById('cf-name');
    const typeEl = document.getElementById('cf-type');
    const locEl = document.getElementById('cf-location');
    const descEl = document.getElementById('cf-desc');
    const videoEl = document.getElementById('cf-video');

    if (!nameEl || !typeEl) {
      showToast('表单元素未找到，请关闭弹窗后重试');
      return;
    }

    const name = nameEl.value.trim();
    const type = typeEl.value;
    const location = locEl ? locEl.value.trim() : '';
    const desc = descEl ? descEl.value.trim() : '';
    const video = videoEl ? videoEl.value.trim() : '';

    if (!name) { showToast('请输入项目名称'); return; }

    // Collect images — only text inputs, exclude hidden file inputs
    const imgInputs = document.querySelectorAll('#cf-images input.form-input');
    const images = [];
    imgInputs.forEach(inp => {
      const v = inp.value.trim();
      if (v) images.push(v);
    });

    if (editId) {
      const idx = appData.cases.findIndex(x => x.id === editId);
      if (idx >= 0) {
        appData.cases[idx].name = name;
        appData.cases[idx].type = type;
        appData.cases[idx].location = location;
        appData.cases[idx].desc = desc;
        appData.cases[idx].images = images;
        appData.cases[idx].video = video;
      }
    } else {
      const newId = 'project-' + Date.now();
      appData.cases.push({
        id: newId,
        name: name,
        type: type,
        location: location,
        desc: desc,
        images: images,
        video: video
      });
    }

    saveData(appData);
    closeModal();
    showToast('保存成功', true);
    renderCases();
  } catch(e) {
    console.error('saveCase error:', e);
    showToast('保存失败：' + (e.message || '未知错误'));
  }
}

function exportData() {
  const json = JSON.stringify(appData, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const now = new Date();
  const ts = now.getFullYear() + ('0'+(now.getMonth()+1)).slice(-2) + ('0'+now.getDate()).slice(-2) + '_' + ('0'+now.getHours()).slice(-2) + ('0'+now.getMinutes()).slice(-2);
  a.href = url;
  a.download = 'qingsong-backup-' + ts + '.json';
  a.click();
  URL.revokeObjectURL(url);
  showToast('数据已导出', true);
}

function importData() {
  const fileInput = document.getElementById('importFile');
  const file = fileInput.files[0];
  if (!file) { showToast('请先选择 JSON 文件'); return; }
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = JSON.parse(e.target.result);
      if (!data.cases || !data.homepage) {
        showToast('数据格式不正确'); return;
      }
      if (!confirm('确认导入？当前数据将被覆盖。')) return;
      appData = data;
      saveData(appData);
      showToast('数据已导入', true);
      renderDataPage();
    } catch(err) {
      showToast('JSON 解析失败，请检查文件');
    }
  };
  reader.readAsText(file);
}

function resetData() {
  if (!confirm('确定重置为默认数据？所有修改将丢失。')) return;
  localStorage.removeItem(STORAGE_KEY);
  appData = getDefaultData();
  saveData(appData);
  showToast('已重置为默认数据', true);
  renderDataPage();
}

        if (sel.rangeCount === 0) return;
        var range = sel.getRangeAt(0);

        // Remove existing font-size spans within selection first, then wrap
        var contents = range.extractContents();
        var span = document.createElement('span');
        span.style.fontSize = val;
        span.appendChild(contents);
        range.insertNode(span);
        sel.removeAllRanges();
        sel.addRange(range);
      });
    }
    // Paste image handler (supports mixed text+image from Word etc.)
    var edt = document.getElementById('blogEditor');
    if (edt) {
      edt.addEventListener('paste', function(ev) {
        var items = ev.clipboardData && ev.clipboardData.items;
        if (!items) return;
        var imageItems = [];
        var htmlItem = null;
        for (var i = 0; i < items.length; i++) {
          var t = items[i].type;
          console.log('[BlogPaste] 剪贴板项 ' + i + ': type=' + t);
          if (t.indexOf('image') === 0) {
            imageItems.push(items[i]);
          } else if (t === 'text/html') {
            htmlItem = items[i];
          }
        }
        if (imageItems.length === 0 && !htmlItem) return;

        // Check if HTML contains local <img> tags that need handling
        var hasLocalImg = false;
        if (htmlItem) {
          try {
            var rawHtml = ev.clipboardData.getData('text/html');
            hasLocalImg = /<img[^>]*\ssrc\s*=\s*["'](?!https?:\/\/|data:)([^"']*)["'][^>]*>/i.test(rawHtml);
            console.log('[BlogPaste] HTML含本地图片:', hasLocalImg);
          } catch(e) {}
        }

        // If no image items and HTML has no local images, let browser handle
        if (imageItems.length === 0 && !hasLocalImg) return;

        ev.preventDefault();
        console.log('[BlogPaste] 拦截粘贴, 图片项:', imageItems.length, '含HTML:', !!htmlItem, '含本地图:', hasLocalImg);
        var edtRef = document.getElementById('blogEditor');
        edtRef.focus();

        // If HTML has local images but no image items from DataTransferItemList,
        // try alternative sources: clipboardData.files (Word on some platforms) or data: URIs in HTML
        if (imageItems.length === 0 && hasLocalImg && htmlItem) {
          // Strategy 1: Try clipboardData.files (Word sometimes provides images as File objects here)
          var clipFiles = ev.clipboardData.files;
          var altImageFiles = [];
          if (clipFiles && clipFiles.length > 0) {
            for (var f = 0; f < clipFiles.length; f++) {
              var ft = clipFiles[f].type;
              var fn = clipFiles[f].name;
              if (ft.indexOf('image') === 0 || /\.(png|jpe?g|gif|bmp|svg|webp|tiff?)$/i.test(fn)) {
                altImageFiles.push(clipFiles[f]);
              }
            }
            console.log('[BlogPaste] 从 clipboardData.files 找到图片:', altImageFiles.length, '张');
          }

          if (altImageFiles.length > 0) {
            // Upload these files via R2, then replace local img src in HTML
            ev.preventDefault();
            var edtRef2 = document.getElementById('blogEditor');
            edtRef2.focus();

            var altUploads = altImageFiles.map(function(file) {
              return uploadToR2(file, null);
            });

            var altPlacholder = '<span class="_bmPastePlaceholder" style="color:#C9A96E;">图片上传中（' + altImageFiles.length + ' 张）...</span>';
            document.execCommand('insertHTML', false, altPlacholder);

            Promise.all(altUploads).then(function(results) {
              var urls = results.map(function(r) { return r.url; });
              console.log('[BlogPaste] files通道上传完成, URLs:', urls);
              var phs = edtRef2.querySelectorAll('._bmPastePlaceholder');
              for (var p = 0; p < phs.length; p++) phs[p].remove();

              htmlItem.getAsString(function(html) {
                var imgIdx = 0;
                html = html.replace(/<img[^>]*\ssrc\s*=\s*["'](?!https?:\/\/|data:)([^"']*)["'][^>]*>/gi, function(match) {
                  if (imgIdx < urls.length) {
                    return match.replace(/\ssrc\s*=\s*["'][^"']*["']/i, ' src="' + urls[imgIdx++] + '"');
                  }
                  return match;
                });
                document.execCommand('insertHTML', false, html);
                showToast(altImageFiles.length + ' 张图片上传成功', true);
              });
            }).catch(function(err) {
              console.error('[BlogPaste] files通道上传失败:', err);
              var phs = edtRef2.querySelectorAll('._bmPastePlaceholder');
              for (var p = 0; p < phs.length; p++) phs[p].remove();
              showToast('上传失败: ' + (err.message || '网络错误'));
            });
            return;
          }

          // Strategy RTF: Parse embedded images from Word's RTF clipboard data
          try {
            var rtfData = ev.clipboardData.getData('text/rtf');
            if (rtfData) {
              console.log('[BlogPaste] RTF数据长度:', rtfData.length);
              // Find \pngblip or \jpegblip keywords and extract hex data after them
              var blipRegex = /\\(pngblip|jpegblip)/gi;
              var rtfImages = [];
              var blipMatch;
              while ((blipMatch = blipRegex.exec(rtfData)) !== null) {
                var fmt = blipMatch[1];
                var idx = blipRegex.lastIndex;
                var hexStr = '';
                while (idx < rtfData.length) {
                  var ch = rtfData[idx];
                  if (ch === '\\') {
                    idx++;
                    while (idx < rtfData.length && /[a-zA-Z]/.test(rtfData[idx])) idx++;
                    while (idx < rtfData.length && /[0-9\-]/.test(rtfData[idx])) idx++;
                    if (idx < rtfData.length && rtfData[idx] === ' ') idx++;
                    continue;
                  }
                  if (ch === ' ' || ch === '\r' || ch === '\n' || ch === '\t') { idx++; continue; }
                  if (/[0-9a-fA-F]/.test(ch)) { hexStr += ch; idx++; }
                  else if (ch === '}' || ch === '{') break;
                  else break;
                }
                if (hexStr.length >= 4) {
                  rtfImages.push({ format: fmt, hex: hexStr });
                }
              }
              console.log('[BlogPaste] RTF中提取到图片数量:', rtfImages.length);

              if (rtfImages.length > 0) {
                ev.preventDefault();
                var edtRefRtf = document.getElementById('blogEditor');
                edtRefRtf.focus();

                var rtfBlobs = rtfImages.map(function(img) {
                  var hex = img.hex;
                  if (hex.length % 2 !== 0) hex = hex.slice(0, -1);
                  var bytes = new Uint8Array(hex.length / 2);
                  for (var bi = 0; bi < hex.length; bi += 2) {
                    bytes[bi / 2] = parseInt(hex.substr(bi, 2), 16);
                  }
                  var mime = img.format === 'jpegblip' ? 'image/jpeg' : 'image/png';
                  return new Blob([bytes], { type: mime });
                });

                var rtfUploads = rtfBlobs.map(function(blob) {
                  return uploadToR2(new File([blob], 'image.' + (blob.type === 'image/jpeg' ? 'jpg' : 'png'), { type: blob.type }), null);
                });

                var rtfPh = '<span class="_bmPastePlaceholder" style="color:#C9A96E;">图片上传中（' + rtfBlobs.length + ' 张）...</span>';
                document.execCommand('insertHTML', false, rtfPh);

                Promise.all(rtfUploads).then(function(results) {
                  var urls = results.map(function(r) { return r.url; });
                  console.log('[BlogPaste] RTF通道上传完成, URLs:', urls);
                  var phs = edtRefRtf.querySelectorAll('._bmPastePlaceholder');
                  for (var p = 0; p < phs.length; p++) phs[p].remove();

                  var rawHtmlForRtf = ev.clipboardData.getData('text/html');
                  if (!rawHtmlForRtf) {
                    var imgTags = '';
                    for (var ik = 0; ik < urls.length; ik++) {
                      imgTags += '<img src="' + urls[ik] + '" style="max-width:100%;border-radius:8px;margin:12px 0;">';
                    }
                    document.execCommand('insertHTML', false, imgTags);
                  } else {
                    var ii = 0;
                    rawHtmlForRtf = rawHtmlForRtf.replace(/<img[^>]*\ssrc\s*=\s*["'](?!https?:\/\/|data:)([^"']*)["'][^>]*>/gi, function(imgMatch) {
                      if (ii < urls.length) {
                        return imgMatch.replace(/\ssrc\s*=\s*["'][^"']*["']/i, ' src="' + urls[ii++] + '"');
                      }
                      return imgMatch;
                    });
                    document.execCommand('insertHTML', false, rawHtmlForRtf);
                  }
                  showToast(rtfBlobs.length + ' 张图片上传成功', true);
                }).catch(function(err) {
                  console.error('[BlogPaste] RTF通道上传失败:', err);
                  var phs = edtRefRtf.querySelectorAll('._bmPastePlaceholder');
                  for (var p = 0; p < phs.length; p++) phs[p].remove();
                  showToast('上传失败: ' + (err.message || '网络错误'));
                });
                return;
              }
            }
          } catch(e) {
            console.warn('[BlogPaste] RTF解析异常:', e);
          }

          // Strategy 2: Try HTML data: URIs inside img tags
          try {
            var rawHtml2 = ev.clipboardData.getData('text/html');
            var dataUriMatches = rawHtml2.match(/<img[^>]*\ssrc\s*=\s*["'](data:image\/[^"']+)["'][^>]*>/gi);
            var dataUris = [];
            if (dataUriMatches) {
              for (var d = 0; d < dataUriMatches.length; d++) {
                var m = dataUriMatches[d].match(/src\s*=\s*["'](data:image\/[^"']+)["']/i);
                if (m) dataUris.push(m[1]);
              }
            }
            console.log('[BlogPaste] HTML中data: URI数量:', dataUris.length);

            if (dataUris.length > 0) {
              ev.preventDefault();
              var edtRef3 = document.getElementById('blogEditor');
              edtRef3.focus();

              var duploads = dataUris.map(function(uri) {
                return fetch(uri).then(function(r) { return r.blob(); }).then(function(blob) {
                  return uploadToR2(new File([blob], 'image.png', { type: blob.type }), null);
                });
              });

              var dplaceholder = '<span class="_bmPastePlaceholder" style="color:#C9A96E;">图片上传中（' + dataUris.length + ' 张）...</span>';
              document.execCommand('insertHTML', false, dplaceholder);

              Promise.all(duploads).then(function(results) {
                var urls = results.map(function(r) { return r.url; });
                console.log('[BlogPaste] dataURI通道上传完成, URLs:', urls);
                var phs = edtRef3.querySelectorAll('._bmPastePlaceholder');
                for (var p = 0; p < phs.length; p++) phs[p].remove();

                var html = rawHtml2;
                var idx = 0;
                html = html.replace(/<img[^>]*\ssrc\s*=\s*["']data:image\/[^"']+["'][^>]*>/gi, function(match) {
                  if (idx < urls.length) {
                    return match.replace(/\ssrc\s*=\s*["'][^"']*["']/i, ' src="' + urls[idx++] + '"');
                  }
                  return match;
                });
                document.execCommand('insertHTML', false, html);
                showToast('图片上传成功', true);
              }).catch(function(err) {
                console.error('[BlogPaste] dataURI上传失败:', err);
                var phs = edtRef3.querySelectorAll('._bmPastePlaceholder');
                for (var p = 0; p < phs.length; p++) phs[p].remove();
                showToast('上传失败: ' + (err.message || '网络错误'));
              });
              return;
            }
          } catch(e) {}

          // Strategy 3: Fallback - strip img tags, keep text
          htmlItem.getAsString(function(html) {
            html = html.replace(/<img[^>]*>/gi, '[图片需通过工具栏上传]');
            document.execCommand('insertHTML', false, html);
          });
          showToast('Word 中的图片无法直接粘贴，请使用工具栏「图片」按钮上传');
          return;
        }

        // Upload all images in parallel
        var uploads = imageItems.map(function(it) {
          var f = it.getAsFile();
          if (!f) {
            console.error('[BlogPaste] getAsFile() 返回 null, 跳过该项');
            return Promise.reject(new Error('getAsFile 返回 null'));
          }
          return uploadToR2(f, null);
        });

        var placeholderHtml = '<span class="_bmPastePlaceholder" style="color:#C9A96E;">图片上传中（' + imageItems.length + ' 张）...</span>';
        document.execCommand('insertHTML', false, placeholderHtml);

        Promise.all(uploads).then(function(results) {
          var urls = results.map(function(r) { return r.url; });
          console.log('[BlogPaste] 全部上传完成, URLs:', urls);
          // Remove placeholder
          var phs = edtRef.querySelectorAll('._bmPastePlaceholder');
          for (var p = 0; p < phs.length; p++) phs[p].remove();

          function doInsert(html) {
            var imgIdx = 0;
            html = html.replace(/<img[^>]*\ssrc\s*=\s*["'](?!https?:\/\/|data:)([^"']*)["'][^>]*>/gi, function(match) {
              if (imgIdx < urls.length) {
                return match.replace(/\ssrc\s*=\s*["'][^"']*["']/i, ' src="' + urls[imgIdx++] + '"');
              }
              return match;
            });
            document.execCommand('insertHTML', false, html);
            showToast(imageItems.length + ' 张图片上传成功', true);
          }

          if (htmlItem) {
            htmlItem.getAsString(function(html) { doInsert(html); });
          } else {
            var imgsHtml = '';
            for (var k = 0; k < urls.length; k++) {
              imgsHtml += '<img src="' + urls[k] + '" style="max-width:100%;border-radius:8px;margin:12px 0;">';
            }
            doInsert(imgsHtml);
          }
        }).catch(function(err) {
          console.error('[BlogPaste] 上传失败:', err);
          var phs = edtRef.querySelectorAll('._bmPastePlaceholder');
          for (var p = 0; p < phs.length; p++) phs[p].remove();
          showToast('上传失败: ' + (err.message || '网络错误'));
        });
      });
    }
  }, 100);
}

function triggerBlogMediaUpload(type) {
  var accepts = { image: 'image/*', video: 'video/mp4', audio: 'audio/mp3' };
  var inp = document.createElement('input');
  inp.type = 'file';
  inp.accept = accepts[type];
  inp.style.display = 'none';
  inp.id = '_bmFile';
  document.body.appendChild(inp);
  inp.onchange = async function() {
    var file = inp.files[0];
    inp.remove();
    if (!file) return;
    var edt = document.getElementById('blogEditor');
    if (!edt) return;
    edt.focus();
    var holderId = '_bmUp' + Date.now();
    document.execCommand('insertHTML', false, '<span id="' + holderId + '" style="color:#C9A96E;">上传中...</span>');
    try {
      var result = await uploadToR2(file, null);
      var mediaHtml = buildMediaHtml(type, result.url);
      var ph = document.getElementById(holderId);
      if (ph) { ph.outerHTML = mediaHtml; }
      else { document.execCommand('insertHTML', false, mediaHtml); }
      showToast({ image: '图片', video: '视频', audio: '音频' }[type] + '上传成功', true);
    } catch(err) {
      var ph2 = document.getElementById(holderId);
      if (ph2) ph2.remove();
      showToast('上传失败: ' + err.message);
    }
  };
  inp.click();
}

  if (!url) return;

function insertBlogMediaByUrl(type, url) {
  var edt = document.getElementById('blogEditor');
  if (!edt) return;
  edt.focus();
  document.execCommand('insertHTML', false, buildMediaHtml(type, url));
}

function buildMediaHtml(type, url) {
  if (type === 'image') {
    return '<img src="' + url + '" style="max-width:100%;border-radius:8px;margin:12px 0;">';
  } else if (type === 'video') {
    if (url.includes('bilibili.com') || url.includes('b23.tv')) {
      return '<div style="position:relative;padding-bottom:56.25%;height:0;overflow:hidden;max-width:100%;margin:12px 0;"><a href="' + url + '" target="_blank" style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:#C9A96E;color:#fff;padding:12px 24px;border-radius:8px;text-decoration:none;">🎬 点击观看视频</a></div>';
    }
    return '<video src="' + url + '" controls style="max-width:100%;border-radius:8px;margin:12px 0;"></video>';
  } else if (type === 'audio') {
    return '<audio src="' + url + '" controls style="width:100%;max-width:500px;margin:12px 0;"></audio>';
  }
  return '';
}

function insertEmbedVideo() {
  var url = prompt('请输入B站或YouTube视频链接：');
  if (!url) return;
  var edt = document.getElementById('blogEditor');
  if (!edt) return;

  var iframe = null;

  // B站: bilibili.com/video/BVxxx 或 b23.tv/xxx
  var bvMatch = url.match(/BV[0-9a-zA-Z]{10}/);
  var aidMatch = url.match(/bilibili\.com\/video\/av(\d+)/i);
  if (bvMatch || aidMatch) {
    var vid = bvMatch ? bvMatch[0] : '';
    var aid = aidMatch ? aidMatch[1] : '';
    var src = '//player.bilibili.com/player.html?autoplay=1';
    if (vid) src += '&bvid=' + vid;
    if (aid) src += '&aid=' + aid;
    iframe = '<iframe src="' + src + '" scrolling="no" border="0" frameborder="no" framespacing="0" allowfullscreen="true" width="100%" height="500" style="max-width:100%;margin:12px 0;border-radius:8px;"></iframe>';
  } else {
    // YouTube: youtube.com/watch?v=XXX 或 youtu.be/XXX 或 youtube.com/embed/XXX
    var ytMatch = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/|youtube\.com\/shorts\/)([a-zA-Z0-9_-]{11})/);
    if (ytMatch) {
      iframe = '<iframe src="https://www.youtube.com/embed/' + ytMatch[1] + '?autoplay=1" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen width="100%" height="500" style="max-width:100%;margin:12px 0;border-radius:8px;"></iframe>';
    }
  }

  if (iframe) {
    edt.focus();
    document.execCommand('insertHTML', false, iframe);
  } else {
    alert('仅支持B站和YouTube视频链接');
  }
}

function importWordDoc(e) {

  inp.type = 'file';
  inp.accept = '.docx';
  inp.style.display = 'none';
  document.body.appendChild(inp);
  inp.onchange = async function() {

    var edt = document.getElementById('blogEditor');

    edt.focus();
    var holderId = '_bmUp' + Date.now();

    try {
      var arrayBuffer = await file.arrayBuffer();

      });

        console.log('[importWordDoc] mammoth warnings:', result.messages);
      }
      var ph = document.getElementById(holderId);
      var html = result.value || '';
      if (ph) { ph.outerHTML = '<div>' + html + '</div>'; }
      else { document.execCommand('insertHTML', false, '<div>' + html + '</div>'); }

      if (ph2) ph2.remove();

}

function cleanEditorHTML(html) {
  if (!html) return '';
  // Strip only white-space that prevents auto-wrap, keep font styles intact
  html = html.replace(/white-space\s*:\s*[^;"]+;?/gi, '');
  // Clean empty style attributes
  html = html.replace(/\s*style\s*=\s*""/gi, '');
  html = html.replace(/\s*style\s*=\s*''/gi, '');
  return html;
}

async function publishBlog(oldSlug) {
  var title = document.getElementById('be-title').value.trim();
  if (!title) { showToast('请输入标题'); return; }

  var summary = document.getElementById('be-summary').value.trim();
  var tagsStr = document.getElementById('be-tags').value.trim();
  var tags = tagsStr ? tagsStr.split(',').map(function(s) { return s.trim(); }).filter(Boolean) : [];
  var cover = document.getElementById('be-cover').value.trim();
  var audioUrl = document.getElementById('be-audio').value.trim();
  var videoUrl = document.getElementById('be-video').value.trim();
  var slug = document.getElementById('be-slug').value.trim() || oldSlug;
  var content = cleanEditorHTML(document.getElementById('blogEditor').innerHTML);

  var body = {
    title: title,
    summary: summary,
    content: content,
    cover: cover,
    tags: tags,
    hasAudio: !!audioUrl,
    audioUrl: audioUrl,
    hasVideo: !!videoUrl,
    videoUrl: videoUrl
  };
  if (slug) body.slug = slug;

  var isEdit = !!oldSlug;
  var method = isEdit ? 'PUT' : 'POST';
  var url = '/api/blog';
  if (isEdit) body.oldSlug = oldSlug;

  try {
    var res = await fetch(url, {
      method: method,
      headers: { 'Content-Type': 'application/json', 'x-admin-token': getAdminToken() },
      body: JSON.stringify(body)
    });
    var data = await res.json();
    if (data.success) {
      showToast(isEdit ? '文章已更新' : '文章已发布', true);
      closeModal();
      renderBlogPage();
    } else {
      showToast('发布失败: ' + (data.error || '未知错误'));
    }
  } catch(e) {
    showToast('发布失败: ' + e.message);
  }
}

let analyticsRange = 'today';

async function renderAnalyticsPage() {
  mainContent.innerHTML = '<div class="page-title">访问统计</div><div style="text-align:center;color:#86868B;padding:40px;">加载中...</div>';
  await loadAnalytics();
}

async function loadAnalytics() {
  try {
    const res = await fetch('/api/analytics?range=' + analyticsRange, { headers: { 'x-admin-token': getAdminToken() } });
    const data = await res.json();
    if (data.error) { mainContent.innerHTML = '<div class="page-title">访问统计</div><div class="card"><p style="text-align:center;color:#cc4444;">错误: ' + data.error + '</p></div>'; return; }
    buildAnalyticsUI(data);
  } catch(e) {
    mainContent.innerHTML = '<div class="page-title">访问统计</div><div class="card"><p style="text-align:center;color:#cc4444;">加载失败: ' + e.message + '</p></div>';
  }
}

function buildAnalyticsUI(d) {
  const totalPV = (d.totalPV || 0).toLocaleString();
  const uniqueVisitors = (d.uniqueVisitors || 0).toLocaleString();
  const avgDuration = formatDuration(d.avgDuration || 0);
  const maxHourVal = d.hourlyDistribution ? Math.max.apply(null, d.hourlyDistribution.map(function(h) { return h.count; })) : 1;

  let html = '<div class="page-title">访问统计</div>';

  // Range toggle
  const ranges = [{key:'today',label:'今日'},{key:'7days',label:'近7天'},{key:'30days',label:'近30天'}];
  html += '<div class="btn-group" style="margin-bottom:24px;">';
  ranges.forEach(function(r) {
    html += '<button class="btn ' + (analyticsRange === r.key ? 'btn-primary' : 'btn-outline') + '" onclick="analyticsRange=\'' + r.key + '\';loadAnalytics()">' + r.label + '</button>';
  });
  html += '</div>';

  // Metrics row
  html += '<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:24px;">';
  html += metricCard('总浏览量 (PV)', totalPV);
  html += metricCard('独立访客 (UV)', uniqueVisitors);
  html += metricCard('平均访问时长', avgDuration);
  html += '</div>';

  // Page ranking
  html += '<div class="card"><div class="card-header"><h3>页面浏览排行</h3></div>';
  if (d.pageRanking && d.pageRanking.length > 0) {
    html += '<div class="table-wrap"><table><thead><tr><th>页面路径</th><th>PV</th><th>占比</th></tr></thead><tbody>';
    d.pageRanking.forEach(function(p) {
      const pv = p.pv || 0;
      const pct = d.totalPV > 0 ? ((pv / d.totalPV) * 100).toFixed(1) : '0.0';
      html += '<tr><td>' + (p.page || '/') + '</td><td>' + pv.toLocaleString() + '</td><td>' + pct + '%</td></tr>';
    });
    html += '</tbody></table></div>';
  } else {
    html += '<p style="text-align:center;color:#86868B;padding:20px;">暂无数据</p>';
  }
  html += '</div>';

  // Country distribution
  html += '<div class="card"><div class="card-header"><h3>国家/地区分布</h3></div>';
  if (d.countryDistribution && d.countryDistribution.length > 0) {
    html += '<div class="table-wrap"><table><thead><tr><th>国家</th><th>PV</th></tr></thead><tbody>';
    d.countryDistribution.forEach(function(c) {
      html += '<tr><td>' + (c.country || '未知') + '</td><td>' + (c.pv || 0).toLocaleString() + '</td></tr>';
    });
    html += '</tbody></table></div>';
  } else {
    html += '<p style="text-align:center;color:#86868B;padding:20px;">暂无数据</p>';
  }
  html += '</div>';

  // Hourly heatmap
  html += '<div class="card"><div class="card-header"><h3>24小时访问分布</h3></div>';
  if (d.hourlyDistribution && d.hourlyDistribution.length === 24) {
    html += '<div style="display:flex;align-items:flex-end;gap:3px;height:180px;padding:8px 0;">';
    for (var i = 0; i < 24; i++) {
      var count = d.hourlyDistribution[i].count || 0;
      var h = maxHourVal > 0 ? Math.max((count / maxHourVal) * 100, 3) : 0;
      html += '<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;">';
      html += '<span style="font-size:10px;color:#86868B;">' + count + '</span>';
      html += '<div style="width:100%;height:' + h + '%;background:linear-gradient(180deg,#C9A96E,#D4B87A);border-radius:4px 4px 0 0;min-height:2px;" title="' + i + ':00 - ' + count + '"></div>';
      html += '<span style="font-size:10px;color:#B0B0B5;">' + (i < 10 ? '0' + i : i) + '</span>';
      html += '</div>';
    }
    html += '</div>';
  } else {
    html += '<p style="text-align:center;color:#86868B;padding:20px;">暂无数据</p>';
  }
  html += '</div>';

  mainContent.innerHTML = html;
}

function metricCard(label, value) {
  return '<div class="card" style="text-align:center;padding:20px;"><div style="font-size:28px;font-weight:700;color:#C9A96E;">' + value + '</div><div style="font-size:13px;color:#86868B;margin-top:6px;">' + label + '</div></div>';
}

function formatDuration(seconds) {
  if (seconds <= 0) return '0 秒';
  if (seconds < 60) return Math.round(seconds) + ' 秒';
  if (seconds < 3600) return Math.floor(seconds / 60) + ' 分 ' + Math.round(seconds % 60) + ' 秒';
  return Math.floor(seconds / 3600) + ' 时 ' + Math.floor((seconds % 3600) / 60) + ' 分';
}

// ==================== CHAT LOGS PAGE ====================
let chatLogsDate = '';
let chatLogsData = { sessions: [] };
let expandedSession = null;

function getTodayStr() {
  var d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
}

function changeChatLogsDate(delta) {
  var d = new Date(chatLogsDate || getTodayStr());
  d.setDate(d.getDate() + delta);
  chatLogsDate = d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
  renderChatLogsPage();
}

async function renderChatLogsPage() {
  if (!chatLogsDate) chatLogsDate = getTodayStr();
  mainContent.innerHTML = '<div class="page-title">对话记录</div><div style="text-align:center;color:#86868B;padding:40px;">加载中...</div>';
  expandedSession = null;
  await loadChatLogs();
}

async function loadChatLogs() {
  try {
    var res = await fetch('/api/chat-logs?date=' + chatLogsDate, { headers: { 'x-admin-token': getAdminToken() } });
    var data = await res.json();
    if (!data.success) {
      mainContent.innerHTML = '<div class="page-title">对话记录</div><div class="card"><p style="text-align:center;color:#cc4444;">错误: ' + (data.error || '未知') + '</p></div>';
      return;
    }
    chatLogsData = data;
    buildChatLogsUI();
  } catch(e) {
    mainContent.innerHTML = '<div class="page-title">对话记录</div><div class="card"><p style="text-align:center;color:#cc4444;">加载失败: ' + e.message + '</p></div>';
  }
}

function buildChatLogsUI() {
  var sessions = chatLogsData.sessions || [];

  var html = '<div class="page-title">对话记录</div>';

  // Date picker
  html += '<div style="display:flex;align-items:center;gap:12px;margin-bottom:20px;">';
  html += '<button class="btn btn-outline btn-sm" onclick="changeChatLogsDate(-1)">&larr; 前一天</button>';
  html += '<span style="font-size:15px;font-weight:600;">' + chatLogsDate + '</span>';
  html += '<button class="btn btn-outline btn-sm" onclick="changeChatLogsDate(1)">后一天 &rarr;</button>';
  html += '<button class="btn btn-outline btn-sm" onclick="chatLogsDate=\'' + getTodayStr() + '\';renderChatLogsPage()">今天</button>';
  html += '</div>';

  if (sessions.length === 0) {
    html += '<div class="card"><p style="text-align:center;color:#86868B;padding:30px;">' + chatLogsDate + ' 暂无对话记录</p></div>';
  } else {
    html += '<div class="msg-info msg-bar">共 ' + sessions.length + ' 个会话</div>';

    sessions.forEach(function(s) {
      var timeDisplay = s.time ? new Date(s.time).toLocaleTimeString('zh-CN', {hour:'2-digit',minute:'2-digit'}) : '--:--';
      var isExpanded = expandedSession === s.sessionId;
      html += '<div class="card" style="padding:16px 20px;">';
      html += '<div style="display:flex;align-items:center;justify-content:space-between;cursor:pointer;" onclick="toggleChatSession(\'' + s.sessionId + '\')">';
      html += '<div style="flex:1;">';
      html += '<div style="font-size:14px;font-weight:600;color:#1D1D1F;">' + timeDisplay + ' — ' + s.userMsgCount + ' 轮对话</div>';
      html += '<div style="font-size:12px;color:#86868B;margin-top:4px;">' + (s.preview || '(无内容)') + '</div>';
      html += '</div>';
      html += '<span style="font-size:12px;color:#C9A96E;">' + (isExpanded ? '收起 ▲' : '展开 ▼') + '</span>';
      html += '</div>';

      if (isExpanded) {
        html += '<div id="chat-detail-' + s.sessionId + '" style="margin-top:12px;padding-top:12px;border-top:1px solid #E8E8ED;"></div>';
      }
      html += '</div>';
    });
  }

  mainContent.innerHTML = html;

  // If there's an expanded session, load its content
  if (expandedSession) {
    loadSessionDetail(expandedSession);
  }
}

async function toggleChatSession(sessionId) {
  if (expandedSession === sessionId) {
    expandedSession = null;
    buildChatLogsUI();
  } else {
    expandedSession = sessionId;
    buildChatLogsUI();
  }
}

async function loadSessionDetail(sessionId) {
  var container = document.getElementById('chat-detail-' + sessionId);
  if (!container) return;
  container.innerHTML = '<div style="text-align:center;color:#86868B;padding:20px;">加载对话内容...</div>';

  try {
    var res = await fetch('/api/chat-logs?date=' + chatLogsDate + '&session=' + encodeURIComponent(sessionId), {
      headers: { 'x-admin-token': getAdminToken() }
    });
    var data = await res.json();
    if (!data.success) {
      container.innerHTML = '<div style="text-align:center;color:#cc4444;padding:10px;">加载失败</div>';
      return;
    }

    var messages = data.messages || [];
    var html = '';
    messages.forEach(function(m) {
      var isUser = m.role === 'user';
      var timeStr = m.timestamp ? new Date(m.timestamp).toLocaleTimeString('zh-CN', {hour:'2-digit',minute:'2-digit',second:'2-digit'}) : '';
      html += '<div style="margin-bottom:12px;display:flex;flex-direction:' + (isUser ? 'row' : 'row-reverse') + ';align-items:flex-start;gap:8px;">';
      html += '<div style="max-width:80%;padding:10px 14px;border-radius:10px;font-size:13px;line-height:1.6;' +
        (isUser
          ? 'background:#F0F0F2;color:#1D1D1F;border-bottom-left-radius:2px;'
          : 'background:#C9A96E;color:#fff;border-bottom-right-radius:2px;') + '">';
      html += '<div style="white-space:pre-wrap;word-break:break-word;">' + escapeHtml(m.content || '') + '</div>';
      html += '<div style="font-size:10px;margin-top:4px;opacity:0.6;">' + timeStr + '</div>';
      html += '</div>';
      html += '</div>';
    });
    container.innerHTML = html;
  } catch(e) {
    container.innerHTML = '<div style="text-align:center;color:#cc4444;padding:10px;">加载失败: ' + e.message + '</div>';
  }
}

function escapeHtml(text) {
  var div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}
</script>
