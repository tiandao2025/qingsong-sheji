<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
  background: #F5F5F7;
  color: #1D1D1F;
  display: flex;
  min-height: 100vh;
}
a { color: #C9A96E; text-decoration: none; }

/* Sidebar */
.sidebar {
  width: 220px;
  background: #1D1D1F;
  color: #fff;
  display: flex;
  flex-direction: column;
  position: fixed;
  top: 0; left: 0; bottom: 0;
  z-index: 10;
}
.sidebar-header {
  padding: 24px 20px;
  border-bottom: 1px solid rgba(255,255,255,0.08);
}
.sidebar-header h2 {
  font-size: 18px;
  color: #C9A96E;
  letter-spacing: 1px;
}
.sidebar-header p {
  font-size: 11px;
  color: #86868B;
  margin-top: 4px;
}
.sidebar-nav {
  flex: 1;
  padding: 16px 0;
}
.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 20px;
  cursor: pointer;
  color: #A8A8A8;
  font-size: 14px;
  transition: all 0.2s;
  border-left: 3px solid transparent;
}
.nav-item:hover { background: rgba(255,255,255,0.04); color: #fff; }
.nav-item.active {
  background: rgba(201,169,110,0.08);
  color: #C9A96E;
  border-left-color: #C9A96E;
}
.nav-item svg { width: 18px; height: 18px; fill: currentColor; }
.sidebar-footer {
  padding: 16px 20px;
  border-top: 1px solid rgba(255,255,255,0.08);
}
.sidebar-footer a {
  font-size: 13px;
  color: #C9A96E;
}

/* Main */
.main {
  margin-left: 220px;
  flex: 1;
  padding: 32px;
  max-width: 1100px;
}
.page-title {
  font-size: 24px;
  font-weight: 700;
  margin-bottom: 24px;
  color: #1D1D1F;
}

/* Cards */
.card {
  background: #fff;
  border-radius: 10px;
  padding: 24px;
  margin-bottom: 20px;
  border: 1px solid #E8E8ED;
}
.card-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
}
.card-header h3 { font-size: 16px; font-weight: 600; }

/* Buttons */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 18px;
  border-radius: 8px;
  font-size: 13px;
  font-weight: 500;
  border: none;
  cursor: pointer;
  transition: all 0.2s;
}
.btn-primary { background: #C9A96E; color: #fff; }
.btn-primary:hover { background: #B8995E; }
.btn-outline { background: #fff; color: #555; border: 1px solid #D1D1D6; }
.btn-outline:hover { background: #F5F5F7; }
.btn-danger { background: #fff; color: #E74C3C; border: 1px solid #E74C3C; }
.btn-danger:hover { background: #FDEDEC; }
.btn-sm { padding: 5px 12px; font-size: 12px; }
.btn-group { display: flex; gap: 8px; }

/* Forms */
.form-group { margin-bottom: 16px; }
.form-label { display: block; font-size: 13px; font-weight: 500; color: #555; margin-bottom: 6px; }
.form-input, .form-select, .form-textarea {
  width: 100%;
  padding: 10px 14px;
  border: 1px solid #D1D1D6;
  border-radius: 8px;
  font-size: 14px;
  font-family: inherit;
  transition: border-color 0.2s;
  background: #fff;
}
.form-input:focus, .form-select:focus, .form-textarea:focus {
  outline: none;
  border-color: #C9A96E;
}
.form-textarea { min-height: 80px; resize: vertical; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

/* Table */
.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th { text-align: left; padding: 12px 16px; background: #FAFAFA; color: #86868B; font-weight: 500; border-bottom: 1px solid #E8E8ED; }
td { padding: 12px 16px; border-bottom: 1px solid #F0F0F2; vertical-align: middle; }
tr:hover td { background: #FAFAFA; }
.tag { display: inline-block; padding: 3px 10px; border-radius: 12px; font-size: 11px; font-weight: 500; }
.tag-home { background: rgba(201,169,110,0.1); color: #C9A96E; }
.tag-commercial { background: rgba(108,117,125,0.1); color: #6C757D; }

/* Image preview */
.img-thumbs { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
.img-thumb { width: 80px; height: 60px; border-radius: 6px; border: 1px solid #E8E8ED; object-fit: cover; cursor: pointer; }
.img-thumb:hover { border-color: #C9A96E; }

/* Modal */
.modal-overlay {
  display: none;
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.4);
  z-index: 100;
  align-items: center; justify-content: center;
}
.modal-overlay.show { display: flex; }
.modal {
  background: #fff;
  border-radius: 12px;
  width: 90%; max-width: 700px;
  max-height: 85vh;
  overflow-y: auto;
  padding: 32px;
}
.modal h3 { font-size: 18px; margin-bottom: 20px; }

/* Blog editor modal — header + left-right split */
.modal.modal-blog {
  display: flex;
  flex-direction: column;
  overflow: hidden;
  padding: 0;
  width: 90vw;
  height: 85vh;
  max-width: 1200px;
}
.modal.modal-blog > h3 { display: none; }

.blog-editor-header {
  flex-shrink: 0;
  padding: 10px 20px;
  border-bottom: 1px solid #E8E8ED;
  background: #FAFAFA;
  font-size: 15px;
  font-weight: 700;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.blog-editor-header-close {
  width: 28px; height: 28px;
  border: none; background: none;
  font-size: 18px; color: #86868B;
  cursor: pointer; border-radius: 6px;
}
.blog-editor-header-close:hover { background: #E8E8ED; color: #333; }

/* Left: editor panel */
.blog-editor-main {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-width: 0;
  border-right: 1px solid #E8E8ED;
}
.blog-editor-toolbar {
  flex-shrink: 0;
  display: flex;
  flex-wrap: wrap;
  gap: 2px;
  padding: 8px 12px;
  background: #FAFAFA;
  border-bottom: 1px solid #E8E8ED;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
}
#blogEditor {
  flex: 1;
  overflow-y: auto;
  padding: 24px;
  font-size: 15px;
  line-height: 1.8;
  outline: none;
  min-height: 300px;
}

/* Right: metadata panel */
.blog-editor-sidebar {
  width: 320px;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  overflow-y: auto;
  padding: 16px 20px;
}
.blog-editor-sidebar .form-group { margin-bottom: 12px; }
.blog-sidebar-section-title {
  font-size: 12px; font-weight: 600;
  color: #86868B; text-transform: uppercase;
  letter-spacing: 0.5px; margin-bottom: 6px;
  cursor: pointer; user-select: none;
  display: flex; align-items: center;
  justify-content: space-between;
}
.blog-sidebar-section-title::after {
  content: '▾'; font-size: 10px; transition: transform 0.2s;
}
.blog-sidebar-section-title.collapsed::after {
  transform: rotate(-90deg);
}
.blog-sidebar-collapsible {
  overflow: hidden;
  transition: max-height 0.3s;
  max-height: 200px;
}
.blog-sidebar-collapsible.collapsed { max-height: 0 !important; }
.blog-publish-btn {
  width: 100%; padding: 12px;
  background: #C41E3A; color: #fff;
  border: none; border-radius: 8px;
  font-size: 15px; font-weight: 600;
  cursor: pointer; margin-top: auto;
  flex-shrink: 0;
  transition: background 0.15s;

.blog-publish-btn:hover { background: #A01830; }
.blog-cancel-btn {

.toast {
  position: fixed; bottom: 32px; right: 32px;
  background: #1D1D1F; color: #fff;
  padding: 12px 24px;
  border-radius: 8px;
  font-size: 14px;
  z-index: 200;
  opacity: 0;
  transform: translateY(16px);
  transition: all 0.3s;
}
.toast.show { opacity: 1; transform: translateY(0); }
.toast.success { background: #27AE60; }

.msg-bar {

  margin-bottom: 16px;

.msg-info { background: rgba(201,169,110,0.08); color: #C9A96E; border: 1px solid rgba(201,169,110,0.2); }
.msg-warn { background: rgba(230,126,34,0.08); color: #E67E22; border: 1px solid rgba(230,126,34,0.2); }

.hidden { display: none; }

  align-items: center;
  justify-content: center;
  min-width: 32px;
  height: 30px;
  padding: 0 8px;
  border: 1px solid #D1D1D6;
  border-radius: 4px;
  background: #fff;
  color: #555;
  font-size: 13px;
  cursor: pointer;
  transition: all 0.15s;

.be-tb-btn:hover { background: #F0F0F2; border-color: #C9A96E; color: #C9A96E; }
.be-tb-btn:active { background: #E8E8ED; }

#blogEditor:empty:before {
  content: attr(placeholder);
  color: #B0B0B5;
  pointer-events: none;
}
#blogEditor img { max-width: 100%; border-radius: 8px; margin: 12px 0; }
#blogEditor video { max-width: 100%; border-radius: 8px; margin: 12px 0; }
#blogEditor audio { width: 100%; max-width: 500px; margin: 12px 0; }
#blogEditor blockquote { border-left: 3px solid #C9A96E; padding-left: 16px; color: #86868B; margin: 16px 0; }
#blogEditor a { color: #C9A96E; }
#blogEditor h2 { margin: 20px 0 10px; font-size: 20px; }
#blogEditor h3 { margin: 16px 0 8px; font-size: 17px; }
#blogEditor ul, #blogEditor ol { padding-left: 24px; margin: 8px 0; }

@media (max-width: 768px) {
  .sidebar { width: 180px; }
  .main { margin-left: 180px; padding: 20px; }
  .form-row { grid-template-columns: 1fr; }

function loadData() {
  const raw = localStorage.getItem(STORAGE_KEY);
  if (raw) {
    try { return JSON.parse(raw); } catch(e) {}
  }
  const defaults = getDefaultData();
  saveData(defaults);
  return defaults;
}

function saveData(data) {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  } catch(e) {
    showToast('保存失败：存储空间不足或数据异常，请尝试减少图片数量');
    throw e;
  }
}

let appData = loadData();

// ==================== UI ====================
const mainContent = document.getElementById('mainContent');
const modalOverlay = document.getElementById('modalOverlay');
const modalContent = document.getElementById('modalContent');
const toast = document.getElementById('toast');

function showToast(msg, success) {
  toast.textContent = msg;
  toast.className = 'toast ' + (success ? 'success' : '') + ' show';
  setTimeout(() => { toast.className = 'toast'; }, 2500);
}

function openModal(html, isBlog) {
  modalContent.innerHTML = html;
  if (isBlog) modalContent.classList.add('modal-blog');
  else modalContent.classList.remove('modal-blog');
  modalOverlay.classList.add('show');
}
function closeModal() {
  // Check blog editor for unsaved content
  const editor = document.getElementById('blogEditor');
  const titleInput = document.getElementById('be-title');
  if (editor && titleInput) {
    var hasTitle = titleInput.value.trim().length > 0;
    var hasBody = editor.textContent.trim().length > 0;
    if (hasTitle || hasBody) {
      if (!confirm('您有未保存的内容，确定要关闭吗？')) return;
    }
  }
  var mDlg = document.getElementById('blogMediaDialog'); if (mDlg) mDlg.remove();
  modalOverlay.classList.remove('show');
}

// Navigation
document.querySelectorAll('.nav-item').forEach(item => {
  item.addEventListener('click', function() {
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    this.classList.add('active');
    const page = this.dataset.page;
    if (page === 'cases') renderCases();
    else if (page === 'homepage') renderHomepage();
    else if (page === 'data') renderDataPage();
    else if (page === 'blog') renderBlogPage();
  });
});


// ==================== IMAGE UPLOAD (Cloudflare R2) ====================
function formatBytes(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
  return (bytes / 1048576).toFixed(2) + ' MB';
}

// 使用 Canvas 自动压缩图片：宽度上限 1200px，JPEG 质量 0.8，PNG 保持格式
async function compressImage(file) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    const objectUrl = URL.createObjectURL(file);
    img.onload = function () {
      URL.revokeObjectURL(objectUrl);
      const MAX_WIDTH = 1200;
      let { width, height } = img;
      if (width > MAX_WIDTH) {
        height = Math.round(height * (MAX_WIDTH / width));
        width = MAX_WIDTH;
      }
      const canvas = document.createElement('canvas');
      canvas.width = width;
      canvas.height = height;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, width, height);
      const isPNG = file.type === 'image/png';
      const mimeType = isPNG ? 'image/png' : 'image/jpeg';
      const quality = isPNG ? undefined : 0.8;
      canvas.toBlob(function (blob) {
        if (blob) {
          resolve({ blob: blob, originalSize: file.size, compressedSize: blob.size });
        } else {
          reject(new Error('图片压缩失败'));
        }
      }, mimeType, quality);
    };
    img.onerror = function () {
      URL.revokeObjectURL(objectUrl);
      reject(new Error('图片加载失败'));
    };
    img.src = objectUrl;
  });
}

async function uploadToR2(file, statusEl) {
  if (statusEl) statusEl.textContent = '压缩中...';
  let blob = file;
  let originalSize = file.size;
  let compressedSize = file.size;
  if (file.type && file.type.startsWith('image/')) {
    try {
      const result = await compressImage(file);
      blob = result.blob;
      originalSize = result.originalSize;
      compressedSize = result.compressedSize;
    } catch (e) {
      if (statusEl) statusEl.textContent = '压缩失败';
      throw e;
    }
  }
  if (statusEl) statusEl.textContent = '上传中...';
  const formData = new FormData();
  formData.append('file', blob, file.name);
  try {
    const res = await fetch('/api/upload', { method: 'POST', body: formData });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || '上传失败');
    if (statusEl) statusEl.textContent = data.url;
    return { url: data.url, originalSize: originalSize, compressedSize: compressedSize };
  } catch (e) {
    if (statusEl) statusEl.textContent = '上传失败';
    throw e;
  }
}

async function handleImageUpload(input) {
  const file = input.files[0];
  if (!file) return;
  const parentDiv = input.parentElement.parentElement;
  const textInput = parentDiv.querySelector('input.form-input');
  const label = input.parentElement;
  // Create status indicator
  const statusSpan = document.createElement('span');
  statusSpan.style.cssText = 'font-size:12px;color:#C9A96E;margin-left:6px;white-space:nowrap;';
  statusSpan.textContent = '压缩中...';
  label.insertAdjacentElement('afterend', statusSpan);
  input.disabled = true;
  try {
    const result = await uploadToR2(file, statusSpan);
    if (textInput) textInput.value = result.url;
    showToast('上传成功: ' + formatBytes(result.originalSize) + ' → ' + formatBytes(result.compressedSize), true);
  } catch (e) {
    showToast('上传失败: ' + (e.message || '网络错误'));
    statusSpan.textContent = '上传失败';
  }
  input.value = '';
  input.disabled = false;
}

function saveCase(editId) {
  try {
    const nameEl = document.getElementById('cf-name');
    const typeEl = document.getElementById('cf-type');
    const locEl = document.getElementById('cf-location');
    const descEl = document.getElementById('cf-desc');
    const videoEl = document.getElementById('cf-video');

    if (!nameEl || !typeEl) {
      showToast('表单元素未找到，请关闭弹窗后重试');
      return;
    }

    const name = nameEl.value.trim();
    const type = typeEl.value;
    const location = locEl ? locEl.value.trim() : '';
    const desc = descEl ? descEl.value.trim() : '';
    const video = videoEl ? videoEl.value.trim() : '';

    if (!name) { showToast('请输入项目名称'); return; }

    // Collect images — only text inputs, exclude hidden file inputs
    const imgInputs = document.querySelectorAll('#cf-images input.form-input');
    const images = [];
    imgInputs.forEach(inp => {
      const v = inp.value.trim();
      if (v) images.push(v);
    });

    if (editId) {
      const idx = appData.cases.findIndex(x => x.id === editId);
      if (idx >= 0) {
        appData.cases[idx].name = name;
        appData.cases[idx].type = type;
        appData.cases[idx].location = location;
        appData.cases[idx].desc = desc;
        appData.cases[idx].images = images;
        appData.cases[idx].video = video;
      }
    } else {
      const newId = 'project-' + Date.now();
      appData.cases.push({
        id: newId,
        name: name,
        type: type,
        location: location,
        desc: desc,
        images: images,
        video: video
      });
    }

    saveData(appData);
    closeModal();
    showToast('保存成功', true);
    renderCases();
  } catch(e) {
    console.error('saveCase error:', e);
    showToast('保存失败：' + (e.message || '未知错误'));
  }
}

function exportData() {
  const json = JSON.stringify(appData, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const now = new Date();
  const ts = now.getFullYear() + ('0'+(now.getMonth()+1)).slice(-2) + ('0'+now.getDate()).slice(-2) + '_' + ('0'+now.getHours()).slice(-2) + ('0'+now.getMinutes()).slice(-2);
  a.href = url;
  a.download = 'qingsong-backup-' + ts + '.json';
  a.click();
  URL.revokeObjectURL(url);
  showToast('数据已导出', true);
}

function importData() {
  const fileInput = document.getElementById('importFile');
  const file = fileInput.files[0];
  if (!file) { showToast('请先选择 JSON 文件'); return; }
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = JSON.parse(e.target.result);
      if (!data.cases || !data.homepage) {
        showToast('数据格式不正确'); return;
      }
      if (!confirm('确认导入？当前数据将被覆盖。')) return;
      appData = data;
      saveData(appData);
      showToast('数据已导入', true);
      renderDataPage();
    } catch(err) {
      showToast('JSON 解析失败，请检查文件');
    }
  };
  reader.readAsText(file);
}

function resetData() {
  if (!confirm('确定重置为默认数据？所有修改将丢失。')) return;
  localStorage.removeItem(STORAGE_KEY);
  appData = getDefaultData();
  saveData(appData);
  showToast('已重置为默认数据', true);
  renderDataPage();
}

    html += '<div class="card"><div class="table-wrap"><table><thead><tr><th>封面</th><th>标题</th><th>标签</th><th>日期</th><th>音视频</th><th>操作</th></tr></thead><tbody>';
    filtered.forEach(function(a) {
      const coverCell = a.cover ? '<img src="' + a.cover + '" style="width:60px;height:45px;object-fit:cover;border-radius:4px;" onerror="this.style.display=\'none\'">' : '<span style="color:#ccc;">无</span>';
      const tags = a.tags ? a.tags.map(function(t) { return '<span class="tag tag-home">' + t + '</span>'; }).join(' ') : '';
      const date = a.createdAt ? new Date(a.createdAt).toLocaleDateString('zh-CN') : '';
      const media = (a.hasAudio ? '🎵' : '') + (a.hasVideo ? '🎬' : '') || '—';
      html += '<tr>';
      html += '<td>' + coverCell + '</td>';
      html += '<td><b>' + (a.title || '') + '</b></td>';
      html += '<td>' + tags + '</td>';
      html += '<td>' + date + '</td>';
      html += '<td>' + media + '</td>';
      html += '<td><div class="btn-group">';
      html += '<button class="btn btn-outline btn-sm" onclick="openBlogEditor(\'' + (a.slug || '') + '\')">编辑</button>';
      html += '<button class="btn btn-danger btn-sm" onclick="deleteBlog(\'' + (a.slug || '') + '\')">删除</button>';
      html += '</div></td></tr>';
    });
    html += '</tbody></table></div></div>';
  } else if (kw) {
    html += '<div class="card"><p style="text-align:center;color:#86868B;padding:30px;">没有匹配"<b>' + kw + '</b>"的文章</p></div>';
  } else {
    html += '<div class="card"><p style="text-align:center;color:#86868B;padding:30px;">暂无文章，点击上方按钮创建第一篇博客</p></div>';
  }

  mainContent.innerHTML = html;
}

async function deleteBlog(slug) {
  if (!confirm('确定删除这篇文章？此操作不可撤销。')) return;
  try {
    const res = await fetch('/api/blog?slug=' + encodeURIComponent(slug), { method: 'DELETE', headers: { 'x-admin-key': 'qingsong2024' } });
    const data = await res.json();
    if (data.success) {
      showToast('文章已删除', true);
      renderBlogPage();
    } else {
      showToast('删除失败: ' + (data.error || '未知错误'));
    }
  } catch(e) {
    showToast('删除失败: ' + e.message);
  }
}

function toggleBlogMedia() {
  var sec = document.getElementById('blogMediaSection');
  var t = sec.previousElementSibling;
  sec.classList.toggle('collapsed');
  t.classList.toggle('collapsed');
}

async function openBlogEditor(slug) {
  const isEdit = !!slug;
  let article = null;
  if (isEdit) {
    // Fetch full article (index doesn't contain content)
    try {
      const res = await fetch('/api/blog?slug=' + encodeURIComponent(slug));
      const data = await res.json();
      if (data.success !== false) { article = data; }
    } catch(e) {}
    // Fallback to index entry if fetch fails
    if (!article) {
      article = blogArticles.find(function(a) { return a.slug === slug; });
    }
  }

  var html = '';

  // Header
  html += '<div class="blog-editor-header">';
  html += '<span>' + (isEdit ? '编辑文章' : '新建文章') + '</span>';
  html += '<button class="blog-editor-header-close" onclick="closeModal()">&times;</button>';
  html += '</div>';

  // Body — left/right split
  html += '<div style="flex:1;display:flex;flex-direction:row;overflow:hidden;">';

  // === LEFT: Editor panel ===
  html += '<div class="blog-editor-main">';
  // Toolbar
  html += '<div class="blog-editor-toolbar">';
  html += '<button class="be-tb-btn" data-cmd="bold" title="加粗"><b>B</b></button>';
  html += '<button class="be-tb-btn" data-cmd="italic" title="斜体"><i>I</i></button>';
  html += '<span style="width:1px;background:#ddd;margin:0 4px;"></span>';
  html += '<button class="be-tb-btn" data-cmd="formatBlock" data-val="h2" title="H2标题">H2</button>';
  html += '<button class="be-tb-btn" data-cmd="formatBlock" data-val="h3" title="H3标题">H3</button>';
  html += '<span style="width:1px;background:#ddd;margin:0 4px;"></span>';
  html += '<button class="be-tb-btn" data-cmd="insertUnorderedList" title="无序列表">&bull;列</button>';
  html += '<button class="be-tb-btn" data-cmd="insertOrderedList" title="有序列表">1.列</button>';
  html += '<span style="width:1px;background:#ddd;margin:0 4px;"></span>';
  html += '<button class="be-tb-btn" data-cmd="formatBlock" data-val="blockquote" title="引用块">"引</button>';
  html += '<span style="width:1px;background:#ddd;margin:0 4px;"></span>';
  html += '<button class="be-tb-btn" onclick="insertBlogMedia(\'image\',event)" title="插入图片">🖼</button>';
  html += '<button class="be-tb-btn" onclick="insertBlogMedia(\'video\',event)" title="插入视频">🎬</button>';
  html += '<button class="be-tb-btn" onclick="insertBlogMedia(\'audio\',event)" title="插入音频">🎵</button>';
  html += '<button class="be-tb-btn" onclick="insertBlogLink()" title="插入链接">🔗</button>';
  html += '</div>';
  // Editor area
  html += '<div id="blogEditor" contenteditable="true" placeholder="开始写作...">';
  html += (article ? (article.content || '') : '');
  html += '</div>';
  html += '</div>';

  // === RIGHT: Metadata sidebar ===
  html += '<div class="blog-editor-sidebar">';
  // Title
  html += '<div class="form-group"><label class="form-label">文章标题 *</label><input class="form-input" id="be-title" value="' + (article ? (article.title || '') : '') + '" placeholder="输入文章标题"></div>';
  // Summary
  html += '<div class="form-group"><label class="form-label">摘要</label><textarea class="form-textarea" id="be-summary" rows="3" style="min-height:60px;">' + (article ? (article.summary || '') : '') + '</textarea></div>';
  // Tags
  html += '<div class="form-group"><label class="form-label">标签（逗号分隔）</label><input class="form-input" id="be-tags" value="' + (article && article.tags ? article.tags.join(',') : '') + '" placeholder="设计,装修,干货"></div>';
  // Cover
  html += '<div class="form-group"><label class="form-label">封面图</label>';
  html += '<div style="display:flex;align-items:center;gap:8px;">';
  html += '<input class="form-input" id="be-cover" value="' + (article ? (article.cover || '') : '') + '" placeholder="图片 URL" style="flex:1;">';
  html += '<label class="btn btn-outline btn-sm" style="cursor:pointer;margin:0;white-space:nowrap;flex-shrink:0;">上传<input type="file" accept="image/*" style="display:none;" onchange="handleBlogCoverUpload(this)"></label>';
  html += '</div></div>';
  // Slug (hidden)
  html += '<input type="hidden" id="be-slug" value="' + (article ? (article.slug || '') : '') + '">';
  // Collapsible media section
  html += '<div class="blog-sidebar-section-title" onclick="toggleBlogMedia()">多媒体附件</div>';
  html += '<div class="blog-sidebar-collapsible collapsed" id="blogMediaSection">';
  html += '<div class="form-group" style="margin-bottom:10px;"><label class="form-label">音频 MP3</label>';
  html += '<div style="display:flex;align-items:center;gap:8px;">';
  html += '<input class="form-input" id="be-audio" value="' + (article ? (article.audioUrl || '') : '') + '" placeholder="音频 URL">';
  html += '<label class="btn btn-outline btn-sm" style="cursor:pointer;margin:0;white-space:nowrap;flex-shrink:0;">上传<input type="file" accept="audio/mp3" style="display:none;" onchange="handleBlogAudioUpload(this)"></label>';
  html += '</div></div>';
  html += '<div class="form-group"><label class="form-label">视频 MP4</label>';
  html += '<div style="display:flex;align-items:center;gap:8px;">';
  html += '<input class="form-input" id="be-video" value="' + (article ? (article.videoUrl || '') : '') + '" placeholder="视频 URL">';
  html += '<label class="btn btn-outline btn-sm" style="cursor:pointer;margin:0;white-space:nowrap;flex-shrink:0;">上传<input type="file" accept="video/mp4" style="display:none;" onchange="handleBlogVideoUpload(this)"></label>';
  html += '</div></div>';
  html += '</div>'; // close blogMediaSection
  // Publish + Cancel buttons
  html += '<button class="blog-publish-btn" onclick="publishBlog(\'' + (isEdit ? (article ? article.slug : '') : '') + '\')">发布文章</button>';
  html += '<button class="blog-cancel-btn" onclick="closeModal()">取消</button>';
  html += '</div>'; // close sidebar

  html += '</div>'; // close flex row

  openModal(html, true);

  // Init toolbar events
  setTimeout(function() {
    document.querySelectorAll('.be-tb-btn[data-cmd]').forEach(function(btn) {
      btn.addEventListener('click', function() {
        var cmd = this.dataset.cmd;
        var val = this.dataset.val || null;
        document.execCommand(cmd, false, val);
        document.getElementById('blogEditor').focus();
      });
    });
    // Paste image handler
    var edt = document.getElementById('blogEditor');
    if (edt) {
      edt.addEventListener('paste', async function(ev) {
        var items = ev.clipboardData && ev.clipboardData.items;
        if (!items) return;
        for (var i = 0; i < items.length; i++) {
          if (items[i].type.indexOf('image') === 0) {
            ev.preventDefault();
            var blob = items[i].getAsFile();
            var holderId = '_bmPaste' + Date.now();
            document.execCommand('insertHTML', false, '<span id="' + holderId + '" style="color:#C9A96E;">图片上传中...</span>');
            try {
              var result = await uploadToR2(blob, null);
              var ph = document.getElementById(holderId);
              if (ph) {
                ph.outerHTML = '<img src="' + result.url + '" style="max-width:100%;border-radius:8px;margin:12px 0;">';
              }
              showToast('图片上传成功', true);
            } catch(err) {
              var ph2 = document.getElementById(holderId);
              if (ph2) ph2.remove();
              showToast('图片上传失败: ' + err.message);
            }
            break;
          }
        }
      });
    }
  }, 100);
}

function insertBlogMedia(type, e) {
  var old = document.getElementById('blogMediaDialog');
  if (old) old.remove();
  var labels = { image: '图片', video: '视频', audio: '音频' };
  var dlg = document.createElement('div');
  dlg.id = 'blogMediaDialog';
  dlg.style.cssText = 'position:fixed;background:#fff;border:1px solid #E8E8ED;border-radius:8px;padding:10px 14px;box-shadow:0 4px 20px rgba(0,0,0,0.15);z-index:350;display:flex;align-items:center;gap:8px;font-size:13px;';
  var x = (e && e.clientX) || 400;
  var y = (e && e.clientY) || 200;
  dlg.style.left = Math.min(x, window.innerWidth - 260) + 'px';
  dlg.style.top = Math.max(y - 40, 10) + 'px';
  dlg.innerHTML = '<span style="color:#555;">插入' + labels[type] + '：</span>' +
    '<button class="btn btn-primary btn-sm" style="padding:5px 14px;">本地上传</button>' +
    '<button class="btn btn-outline btn-sm">输入 URL</button>' +
    '<button class="btn btn-outline btn-sm" style="padding:5px 10px;">✕</button>';
  var btns = dlg.querySelectorAll('button');
  btns[0].onclick = function() { dlg.remove(); triggerBlogMediaUpload(type); };
  btns[1].onclick = function() { dlg.remove(); promptBlogMediaUrl(type); };
  btns[2].onclick = function() { dlg.remove(); };
  document.body.appendChild(dlg);
  function closeOnOutside(ev) {
    if (!dlg.contains(ev.target)) { dlg.remove(); document.removeEventListener('click', closeOnOutside); }
  }
  setTimeout(function() { document.addEventListener('click', closeOnOutside); }, 0);
}

function triggerBlogMediaUpload(type) {
  var accepts = { image: 'image/*', video: 'video/mp4', audio: 'audio/mp3' };
  var inp = document.createElement('input');
  inp.type = 'file';
  inp.accept = accepts[type];
  inp.style.display = 'none';
  inp.id = '_bmFile';
  document.body.appendChild(inp);
  inp.onchange = async function() {
    var file = inp.files[0];
    inp.remove();
    if (!file) return;
    var edt = document.getElementById('blogEditor');
    if (!edt) return;
    edt.focus();
    var holderId = '_bmUp' + Date.now();
    document.execCommand('insertHTML', false, '<span id="' + holderId + '" style="color:#C9A96E;">上传中...</span>');
    try {
      var result = await uploadToR2(file, null);
      var mediaHtml = buildMediaHtml(type, result.url);
      var ph = document.getElementById(holderId);
      if (ph) { ph.outerHTML = mediaHtml; }
      else { document.execCommand('insertHTML', false, mediaHtml); }
      showToast({ image: '图片', video: '视频', audio: '音频' }[type] + '上传成功', true);
    } catch(err) {
      var ph2 = document.getElementById(holderId);
      if (ph2) ph2.remove();
      showToast('上传失败: ' + err.message);
    }
  };
  inp.click();
}

function promptBlogMediaUrl(type) {
  var labels = { image: '图片', video: '视频', audio: '音频' };
  var url = prompt('请输入' + labels[type] + ' URL：');
  if (!url) return;
  insertBlogMediaByUrl(type, url);
}

function insertBlogMediaByUrl(type, url) {
  var edt = document.getElementById('blogEditor');
  if (!edt) return;
  edt.focus();
  document.execCommand('insertHTML', false, buildMediaHtml(type, url));
}

function buildMediaHtml(type, url) {
  if (type === 'image') {
    return '<img src="' + url + '" style="max-width:100%;border-radius:8px;margin:12px 0;">';
  } else if (type === 'video') {
    if (url.includes('bilibili.com') || url.includes('b23.tv')) {
      return '<div style="position:relative;padding-bottom:56.25%;height:0;overflow:hidden;max-width:100%;margin:12px 0;"><a href="' + url + '" target="_blank" style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:#C9A96E;color:#fff;padding:12px 24px;border-radius:8px;text-decoration:none;">🎬 点击观看视频</a></div>';
    }
    return '<video src="' + url + '" controls style="max-width:100%;border-radius:8px;margin:12px 0;"></video>';
  } else if (type === 'audio') {
    return '<audio src="' + url + '" controls style="width:100%;max-width:500px;margin:12px 0;"></audio>';
  }
  return '';
}

function insertBlogLink() {
  var url = prompt('请输入链接 URL：');
  if (!url) return;
  var text = prompt('请输入链接文字：', url);
  var edt = document.getElementById('blogEditor');
  if (!edt) return;
  edt.focus();
  document.execCommand('insertHTML', false, '<a href="' + url + '" target="_blank">' + (text || url) + '</a>');
}

async function handleBlogCoverUpload(input) {
  const file = input.files[0];
  if (!file) return;
  const textInput = document.getElementById('be-cover');
  input.disabled = true;
  try {
    const result = await uploadToR2(file, null);
    if (textInput) textInput.value = result.url;
    showToast('封面上传成功', true);
  } catch(e) {
    showToast('上传失败: ' + e.message);
  }
  input.value = '';
  input.disabled = false;
}

async function handleBlogAudioUpload(input) {
  const file = input.files[0];
  if (!file) return;
  const textInput = document.getElementById('be-audio');
  input.disabled = true;
  try {
    const formData = new FormData();
    formData.append('file', file, file.name);
    const res = await fetch('/api/upload', { method: 'POST', body: formData });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || '上传失败');
    if (textInput) textInput.value = data.url;
    showToast('音频上传成功', true);
  } catch(e) {
    showToast('上传失败: ' + e.message);
  }
  input.value = '';
  input.disabled = false;
}

async function handleBlogVideoUpload(input) {
  const file = input.files[0];
  if (!file) return;
  const textInput = document.getElementById('be-video');
  input.disabled = true;
  try {
    const formData = new FormData();
    formData.append('file', file, file.name);
    const res = await fetch('/api/upload', { method: 'POST', body: formData });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || '上传失败');
    if (textInput) textInput.value = data.url;
    showToast('视频上传成功', true);
  } catch(e) {
    showToast('上传失败: ' + e.message);
  }
  input.value = '';
  input.disabled = false;
}

function cleanEditorHTML(html) {
  if (!html) return '';
  // Strip only white-space that prevents auto-wrap, keep font styles intact
  html = html.replace(/white-space\s*:\s*[^;"]+;?/gi, '');
  // Clean empty style attributes
  html = html.replace(/\s*style\s*=\s*""/gi, '');
  html = html.replace(/\s*style\s*=\s*''/gi, '');
  return html;
}

async function publishBlog(oldSlug) {
  var title = document.getElementById('be-title').value.trim();
  if (!title) { showToast('请输入标题'); return; }

  var summary = document.getElementById('be-summary').value.trim();
  var tagsStr = document.getElementById('be-tags').value.trim();
  var tags = tagsStr ? tagsStr.split(',').map(function(s) { return s.trim(); }).filter(Boolean) : [];
  var cover = document.getElementById('be-cover').value.trim();
  var audioUrl = document.getElementById('be-audio').value.trim();
  var videoUrl = document.getElementById('be-video').value.trim();
  var slug = document.getElementById('be-slug').value.trim() || oldSlug;
  var content = cleanEditorHTML(document.getElementById('blogEditor').innerHTML);

  var body = {
    title: title,
    summary: summary,
    content: content,
    cover: cover,
    tags: tags,
    hasAudio: !!audioUrl,
    audioUrl: audioUrl,
    hasVideo: !!videoUrl,
    videoUrl: videoUrl
  };
  if (slug) body.slug = slug;

  var isEdit = !!oldSlug;
  var method = isEdit ? 'PUT' : 'POST';
  var url = '/api/blog';
  if (isEdit) body.oldSlug = oldSlug;

  try {
    var res = await fetch(url, {
      method: method,
      headers: { 'Content-Type': 'application/json', 'x-admin-key': 'qingsong2024' },
      body: JSON.stringify(body)
    });
    var data = await res.json();
    if (data.success) {
      showToast(isEdit ? '文章已更新' : '文章已发布', true);
      closeModal();
      renderBlogPage();
    } else {
      showToast('发布失败: ' + (data.error || '未知错误'));
    }
  } catch(e) {
    showToast('发布失败: ' + e.message);
  }
}
